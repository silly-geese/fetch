name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Lint
        run: uvx ruff check src/ tests/
      - name: Format check
        run: uvx ruff format --check src/ tests/
      - name: Test
        run: uv run pytest -q
